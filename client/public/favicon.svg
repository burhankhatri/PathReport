<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- Minimalist code and microscope -->
  <rect width="100" height="100" rx="20" fill="#0f172a" />
  <!-- Left bracket -->
  <path d="M 35 30 L 15 50 L 35 70" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Right bracket -->
  <path d="M 65 30 L 85 50 L 65 70" fill="none" stroke="#38bdf8" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Microscope in the middle -->
  <circle cx="50" cy="38" r="12" fill="none" stroke="#f8fafc" stroke-width="6"/>
  <path d="M 50 50 v 18" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
  <path d="M 38 68 h 24" stroke="#f8fafc" stroke-width="6" stroke-linecap="round"/>
</svg>
